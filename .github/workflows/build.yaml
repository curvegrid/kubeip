name: build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'docs/**'
      - 'deploy/**'
      - '*.md'
      - '*.yaml'
      - '*.sh'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - '**'

jobs:

  validate:

    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.22

      - name: install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
          install-only: true

      - name: format
        run: golangci-lint fmt --diff --config=.golangci.yaml

      - name: lint
        run: golangci-lint run --config=.golangci.yaml --verbose --output.checkstyle.path=golangci-lint.out ./...

      - name: test
        shell: sh
        env:
          CGO_ENABLED: 0
        run: |
          make test-json

      - name: upload test results
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-reports
          if-no-files-found: ignore
          path: |
            golangci-lint.out
            test-report.out
            coverage.out

  docker-build:

    runs-on: ubuntu-latest
    needs: validate
    # build only on master branch and tags
    if: ${{
      (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) &&
      (
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))) ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
      }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: get short sha
        id: short_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: get version
        id: version
        run: echo "version=$([[ -z \"${{ github.event.pull_request.number }}\" ]] && echo \"sha-${{ steps.short_sha.outputs.sha }}\" || echo \"pr-${{ github.event.pull_request.number }}\")" >> "$GITHUB_OUTPUT"

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: prepare meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ github.repository }}-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            github.run.id=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            org.opencontainers.image.title=kubeip-agent
            org.opencontainers.image.description=kubeip agent
            org.opencontainers.image.vendor=DoiT International

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.short_sha.outputs.sha }}
            BRANCH=${{ github.ref_name }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
