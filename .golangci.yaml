version: "2"

run:
  timeout: 5m
  issues-exit-code: 2
  tests: false
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - funlen
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - importas
    - ineffassign
    - interfacebloat
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - musttag
    - nakedret
    - nilerr
    - nilnil
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
    - wrapcheck
    - zerologlint
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 105
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - rangeValCopy
        - unnamedResult
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G601
    govet:
      enable:
        - shadow
    misspell:
      locale: US
      ignore-rules:
        - cancelled
    # Preserve the old gosimple + stylecheck scope without taking on the full
    # staticcheck ruleset during the v2 migration.
    staticcheck:
      checks:
        - S*
        - ST*
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -ST1023
    tagliatelle:
      case:
        rules:
          json: snake
        use-field-name: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupl
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
      - path: (.+)\.go$
        text: Using the variable on range scope `tt` in function literal
      # Keep the existing internal/types package layout instead of renaming
      # packages as part of the lint migration.
      - path: internal/types/.*\.go
        text: avoid meaningless package names
        linters:
          - revive
    paths:
      - ^mocks($|/)
      - third_party$
      - builtin$
      - examples$

formatters:
  # In golangci-lint v2, formatters run under `fmt` rather than `run`, so CI
  # and `make lint` enforce formatting explicitly with `fmt --diff`.
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/golangci/golangci-lint
  exclusions:
    generated: lax
    paths:
      - ^mocks($|/)
      - third_party$
      - builtin$
      - examples$
